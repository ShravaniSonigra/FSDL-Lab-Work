<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 20px;
        
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            boxshadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 20px;
            text-align: center;
        }
        select {
            padding: 8px 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1> Interactive Weather Dashboard </h1>

    <div class = "controls">
        <label for = "city">Select City: </label>
        <select id = "city" onchange="updateData()">
            <option value = "pune">Pune</option>
            <option value = "mumbai">Mumbai</option>
            <option value = "delhi">Delhi</option>
        </select>
    </div>

    <div class = "dashboard">
        <div class = "card">
            <h3>Temperature (°C)</h3>
            <canvas id = "tempChart"></canvas>
        </div>
        <div class = "card">
            <h3>Humidity (%)</h3>
            <canvas id = "humidityChart"></canvas>
        </div>
        <div class = "card">
            <h3>Rainfall (mm)</h3>
            <canvas id = "rainChart"></canvas>
        </div>
    </div>

    <script>
        //Sample real-lfe inspired weather data
        const weatherData = {
            pune: {
                temp: [24, 26, 28, 27, 25, 24, 23],
                humidity: [60, 58, 55, 57, 59, 62, 65],
                rain: [0, 2, 5, 1, 0, 0, 0]
            },
            mumbai: {
                temp: [27, 28, 29, 29, 28, 27, 27],
                humidity: [75, 78, 80, 79, 77, 76, 78],
                rain: [5, 12, 20, 18, 10, 6, 8]
            },
            delhi: {
                temp: [18, 20, 22, 23, 21, 19, 18],
                humidity: [50, 48, 45, 46, 49, 52, 54],
                rain: [0, 0, 0, 1, 0, 0, 0]
            }
        };

        const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        const tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Temperature',
                    data: weatherData.pune.temp,
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 2,
                }]
            }
        })

        const humidityChart = new Chart(document.getElementById('humidityChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Humidity',
                    data: weatherData.pune.humidity,
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 2,
                }]
            }
        })

        const rainChart = new Chart(document.getElementById('rainChart'), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Rainfall',
                    data: weatherData.pune.rain,
                    borderWidth: 2
                }]
            }
        });

        function updateData() {
            const city = document.getElementById('city').value;

            tempChart.data.datasets[0].data = weatherData[city].temp;
            humidityChart.data.datasets[0].data = weatherData[city].humidity;
            rainChart.data.datasets[0].data = weatherData[city].rain;

            tempChart.update();
            humidityChart.update();
            rainChart.update();
        }
    </script>
</body>
</html>
