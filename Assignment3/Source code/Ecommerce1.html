<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <title>Fashion Hub</title>

    <!--Bootstrap CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1c0d5;
            font-family: sans-serif;
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }

    </style>

</head>

<body>
    <nav class = "navbar navbar-dark bg-dark">
        <div class = "container">
            <a class = "navbar-brand" href = "#">Fashion Hub</a>
            <a href = "cart.html" class = "btn btn-outline-light">View Cart</a>
            <a href = "login.html" class = "btn btn-outline-light">Login</a>
        </div>
    </nav>

    <div class = "container mt-4">
        <div class = "row">
            
            <!--Product 1-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "MenT-Shirt.jpeg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Men T-Shirt</h5>
                        <p>Rs.1500</p>
                        <button class = "btn btn-primary" onclick="addToCart('Men T-Shirt',1500)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!--Product 2-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "WomenDress.jpeg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Women Dress</h5>
                        <p>Rs.2000</p>
                        <button class = "btn btn-primary" onclick="addToCart('Women Dress',2000)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!--Product 3-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "Accessories.jpg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Accessories</h5>
                        <p>Rs.500</p>
                        <button class = "btn btn-primary" onclick="addToCart('Accessories',500)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!--Product 4-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "Jackets.jpg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Jackets</h5>
                        <p>Rs.2000</p>
                        <button class = "btn btn-primary" onclick="addToCart('Jackets',2000)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!--Product 5-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "Shoes.jpg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Footwear</h5>
                        <p>Rs.5000</p>
                        <button class = "btn btn-primary" onclick="addToCart('Footwear',5000)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!--Product 6-->
            <div class = "col-md-4">
                <div class = "card">
                    <img src = "Perfume.jpg" class = "card-img-top">
                    <div class = "card-body text-center">
                        <h5 class = "card-title">Perfume</h5>
                        <p>Rs.3000</p>
                        <button class = "btn btn-primary" onclick="addToCart('Perfume',3000)">Add to Cart</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
        <script>
            function addToCart(name, price) {
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                cart.push({ name, price });
                localStorage.setItem("cart", JSON.stringify(cart));
                alert(name + " has been added to your cart.");
            }
        </script>

</body>

</html>
