<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-color: #f1c0d5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
    }

    .login-box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .login-title {
        text-align: center;
        margin-bottom: 25px;
        font-weight: bold;
        color: #d63384;
    }

    .btn-login {
        background-color: #d63384;
        border: none;
        width: 100%;
    }

    .btn-login:hover {
        background-color: #c21870;
    }
    </style>

</head>
<body>
     <div class="login-box">
        <h3 class="login-title">Login Page</h3>
        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Username:</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your username">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password">
            </div>
            
            <button type="button" class="btn btn-login" onclick="showMessage()">Login</button>
            <!-- <button type="submit" class="btn btn-primary">Submit</button> -->
            <!-- <button type="reset" class="btn btn-secondary">Reset</button> -->

        </form>
        <script>
        function showMessage()
        {
            alert("Logged In Successfully!!");
         }
    </script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
