<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        min-height: 100vh;
        font-family: sans-serif;
    }

    .container {
        background: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    </style>

</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="Ecommerce1.html">Fashion Hub</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>My Shopping Cart</h3>
        <ul class="list-group" id="cart-items"></ul>

        <h4 class="mt-3">Total: Rs.<span id="total-price">0</span></h4>
    </div>

    <button class="btn btn-danger mt-3" onclick="clearCart()">
        Clear Cart
    </button>


    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let cartItems = document.getElementById("cart-items");
        let total = 0;

        cart.forEach(item => {
            let li = document.createElement("li");
            li.className = "list-group-item";
            li.innerText = item.name + " - Rs." + item.price;
            cartItems.appendChild(li);
            total += item.price;
        });

        document.getElementById("total-price").innerText = total;

        function clearCart() {
            localStorage.removeItem("cart");   
            cartItems.innerHTML = "";           
            document.getElementById("total-price").innerText = 0;
        }

    </script>
</body>
</html>
